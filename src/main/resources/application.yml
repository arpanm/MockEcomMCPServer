spring:
  application:
    name: mock-ecom-mcp-server
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:mockecomdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  ai:
    mcp:
      server:
        name: mock-ecom-mcp-server
        version: 1.0.0
        type: SYNC
        instructions: "Mock Ecommerce MCP Server providing 28 tools for product search, cart management, orders, reviews, wishlist, and support tickets across grocery, fashion, electronics, beauty, and home categories."

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mock.ecom: DEBUG
    org.springframework.ai: INFO

app:
  session:
    ttl-hours: 24
  mock:
    platform-secret: mock-platform-secret-key
  pagination:
    default-page-size: 10
    max-page-size: 50
